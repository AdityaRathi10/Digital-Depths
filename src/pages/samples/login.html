<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Digital Deaft </title>
    <link rel="stylesheet" href="../../assets/vendors/feather/feather.css">
    <link rel="stylesheet" href="../../assets/vendors/mdi/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="../../assets/vendors/ti-icons/css/themify-icons.css">
    <link rel="stylesheet" href="../../assets/vendors/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../assets/vendors/typicons/typicons.css">
    <link rel="stylesheet" href="../../assets/vendors/simple-line-icons/css/simple-line-icons.css">
    <link rel="stylesheet" href="../../assets/vendors/css/vendor.bundle.base.css">
    <link rel="stylesheet" href="../../assets/vendors/bootstrap-datepicker/bootstrap-datepicker.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="shortcut icon" href="../../assets/images/favicon.png" />
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth px-0">
          <div class="row w-100 mx-0">
            <div class="col-lg-4 mx-auto">
              <div class="auth-form-light text-left py-5 px-4 px-sm-5">
                <div class="brand-logo">
                  <h4>Digital Deaft</h4>
                </div>
                <h4>Hello! let's get started</h4>
                <h6 class="fw-light">Sign in to continue.</h6>
                
                <div id="errorMessage" class="alert alert-danger d-none mt-3" style="font-size: 14px; padding: 10px;"></div>

                <form class="pt-3" id="loginForm">
                  <div class="form-group">
                    <input type="email" class="form-control form-control-lg" id="loginEmail" placeholder="Email" required>
                  </div>
                  <div class="form-group">
                    <input type="password" class="form-control form-control-lg" id="loginPassword" placeholder="Password" required>
                  </div>
                  <div class="mt-3 d-grid gap-2">
                    <button type="submit" class="btn btn-block btn-primary btn-lg fw-medium auth-form-btn" id="loginBtn">SIGN IN</button>
                  </div>
                  <div class="my-2 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                      <label class="form-check-label text-muted">
                        <input type="checkbox" class="form-check-input"> Keep me signed in </label>
                    </div>
                    <a href="#" class="auth-link text-black">Forgot password?</a>
                  </div>

                  <div class="mb-2 d-grid gap-2">
                    <button type="button" class="btn btn-block btn-danger auth-form-btn" id="googleLoginBtn" style="background-color: #db4437; border-color: #db4437;">
                      <i class="mdi mdi-google me-2"></i>Connect using Google </button>
                  </div>

                  <!-- <div class="mb-2 d-grid gap-2">
                    <button type="button" class="btn btn-block btn-facebook auth-form-btn">
                      <i class="ti-facebook me-2"></i>Connect using facebook </button>
                  </div> -->
                  
                  <div class="text-center mt-4 fw-light"> Don't have an account? <a href="register.html" class="text-primary">Create</a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
        </div>
      </div>
    <script src="../../assets/vendors/js/vendor.bundle.base.js"></script>
    <script src="../../assets/vendors/bootstrap-datepicker/bootstrap-datepicker.min.js"></script>
    <script src="../../assets/js/off-canvas.js"></script>
    <script src="../../assets/js/template.js"></script>
    <script src="../../assets/js/settings.js"></script>
    <script src="../../assets/js/hoverable-collapse.js"></script>
    <script src="../../assets/js/todolist.js"></script>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAtUOm-altWppyypwTJiUppRzUkYjac3bk",
    authDomain: "digital-deaft-2026.firebaseapp.com",
    projectId: "digital-deaft-2026",
    storageBucket: "digital-deaft-2026.firebasestorage.app",
    messagingSenderId: "605091613705",
    appId: "1:605091613705:web:eed0c1b18c7cb1dfc83cd8",
    measurementId: "G-CHSFWH9LFT"
  };

  // Firebase Initialize
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  const errorDiv = document.getElementById('errorMessage');

  // ========================================================
  // ⚡ 1. AUTO-REDIRECT CHECK (Agar pehle se login ho)
  // ========================================================
  onAuthStateChanged(auth, (user) => {
      if (user) {
          console.log("[SYSTEM] Active session found! Redirecting to dashboard...");
          // Flask routing ke mutabik root path '/' ya '/index.html' use karein
          window.location.href = "/index.html";
      }
  });

  // ========================================================
  // ⚡ 2. BROWSER CLOSE EVENT (Flask Server Auto-Terminate)
  // ========================================================
  window.addEventListener('beforeunload', function () {
      // Jab client window/tab band karega, yeh backend ko shutdown trigger bhejega
      navigator.sendBeacon("http://127.0.0.1:5500/shutdown");
  });

  // ========================================================
  // 3. EMAIL/PASSWORD LOGIN
  // ========================================================
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const loginBtn = document.getElementById('loginBtn');

      errorDiv.classList.add('d-none');
      loginBtn.disabled = true;
      loginBtn.innerText = "Authenticating...";

      try {
          await signInWithEmailAndPassword(auth, email, password);
          const user = auth.currentUser;
          localStorage.setItem("loggedUser", user.email);
          window.location.href = "/index.html";
      } catch (error) {
          console.error(error);
          errorDiv.classList.remove('d-none');
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
              errorDiv.innerText = "Invalid email or password.";
          } else {
              errorDiv.innerText = "Error: " + error.message;
          }
          loginBtn.disabled = false;
          loginBtn.innerText = "SIGN IN";
      }
  });

  // ========================================================
  // 4. GOOGLE SIGN-IN POPUP
  // ========================================================
  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      errorDiv.classList.add('d-none');
      try {
          await signInWithPopup(auth, googleProvider);
          const user = auth.currentUser;
          localStorage.setItem("loggedUser", user.email);
          window.location.href = "/index.html";
      } catch (error) {
          console.error(error);
          if (error.code !== 'auth/popup-closed-by-user') {
              errorDiv.classList.remove('d-none');
              errorDiv.innerText = "Google Sign-In Failed: " + error.message;
          }
      }
  });
</script>
  </body>
</html>
