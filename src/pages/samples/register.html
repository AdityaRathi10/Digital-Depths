<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Star Admin2 </title>
    <link rel="stylesheet" href="../../assets/vendors/feather/feather.css">
    <link rel="stylesheet" href="../../assets/vendors/mdi/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="../../assets/vendors/ti-icons/css/themify-icons.css">
    <link rel="stylesheet" href="../../assets/vendors/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../assets/vendors/typicons/typicons.css">
    <link rel="stylesheet" href="../../assets/vendors/simple-line-icons/css/simple-line-icons.css">
    <link rel="stylesheet" href="../../assets/vendors/css/vendor.bundle.base.css">
    <link rel="stylesheet" href="../../assets/vendors/bootstrap-datepicker/bootstrap-datepicker.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="shortcut icon" href="../../assets/images/favicon.png" />
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth px-0">
          <div class="row w-100 mx-0">
            <div class="col-lg-4 mx-auto">
              <div class="auth-form-light text-left py-5 px-4 px-sm-5">
                <div class="brand-logo">
                  <img src="../../assets/images/logo.svg" alt="logo">
                </div>
                <h4>New here?</h4>
                <h6 class="fw-light">Signing up is easy. It only takes a few steps</h6>
                
                <div id="statusMessage" class="alert d-none mt-3" style="font-size: 14px; padding: 10px;"></div>

                <form class="pt-3" id="registerForm">
                  <div class="form-group">
                    <input type="text" class="form-control form-control-lg" id="regUsername" placeholder="Username" required>
                  </div>
                  <div class="form-group">
                    <input type="email" class="form-control form-control-lg" id="regEmail" placeholder="Email" required>
                  </div>
                  <div class="form-group">
                    <select class="form-select form-select-lg" id="regCountry">
                      <option value="">Country</option>
                      <option value="United States of America">United States of America</option>
                      <option value="United Kingdom">United Kingdom</option>
                      <option value="India">India</option>
                      <option value="Germany">Germany</option>
                      <option value="Argentina">Argentina</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <input type="password" class="form-control form-control-lg" id="regPassword" placeholder="Password" required minlength="6">
                  </div>
                  <div class="mb-4">
                    <div class="form-check">
                      <label class="form-check-label text-muted">
                        <input type="checkbox" class="form-check-input" id="termsCheck" required> I agree to all Terms & Conditions </label>
                    </div>
                  </div>
                  <div class="mt-3 d-grid gap-2">
                    <button type="submit" class="btn btn-block btn-primary btn-lg fw-medium auth-form-btn" id="registerBtn">SIGN UP</button>
                  </div>
                  <div class="text-center mt-4 fw-light"> Already have an account? <a href="login.html" class="text-primary">Login</a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
        </div>
      </div>
    <script src="../../assets/vendors/js/vendor.bundle.base.js"></script>
    <script src="../../assets/vendors/bootstrap-datepicker/bootstrap-datepicker.min.js"></script>
    <script src="../../assets/js/off-canvas.js"></script>
    <script src="../../assets/js/template.js"></script>
    <script src="../../assets/js/settings.js"></script>
    <script src="../../assets/js/hoverable-collapse.js"></script>
    <script src="../../assets/js/todolist.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // Same Firebase Config copy paste karein jo login page me dali thi
      const firebaseConfig = {
        apiKey: "AIzaSyAtUOm-altWppyypwTJiUppRzUkYjac3bk",
      authDomain: "digital-deaft-2026.firebaseapp.com",
      projectId: "digital-deaft-2026",
      storageBucket: "digital-deaft-2026.firebasestorage.app",
      messagingSenderId: "605091613705",
      appId: "1:605091613705:web:eed0c1b18c7cb1dfc83cd8",
      measurementId: "G-CHSFWH9LFT"
      };

      // Firebase initialize
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const statusDiv = document.getElementById('statusMessage');
      const registerBtn = document.getElementById('registerBtn');

      // Handle Sign Up
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('regEmail').value;
          const password = document.getElementById('regPassword').value;
          const termsChecked = document.getElementById('termsCheck').checked;

          if(!termsChecked) {
              statusDiv.className = "alert alert-danger mt-3";
              statusDiv.innerText = "Please accept the Terms & Conditions.";
              statusDiv.classList.remove('d-none');
              return;
          }

          // UI changes during processing
          statusDiv.classList.add('d-none');
          registerBtn.disabled = true;
          registerBtn.innerText = "Creating Account...";

          try {
              // Firebase Creation Call
              await createUserWithEmailAndPassword(auth, email, password);
              
              // Success Message
              statusDiv.className = "alert alert-success mt-3";
              statusDiv.innerText = "Account created successfully! Redirecting...";
              statusDiv.classList.remove('d-none');
              
              // Redirect to main index dashboard
              setTimeout(() => {
                  window.location.href = "../../index.html";
              }, 1500);

          } catch (error) {
              console.error(error);
              statusDiv.className = "alert alert-danger mt-3";
              statusDiv.classList.remove('d-none');
              
              // Formatting errors for clarity
              if (error.code === 'auth/email-already-in-use') {
                  statusDiv.innerText = "This email is already registered. Try logging in.";
              } else if (error.code === 'auth/weak-password') {
                  statusDiv.innerText = "Password should be at least 6 characters long.";
              } else {
                  statusDiv.innerText = "Error: " + error.message;
              }
              
              registerBtn.disabled = false;
              registerBtn.innerText = "SIGN UP";
          }
      });
    </script>
  </body>
</html>
